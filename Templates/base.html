<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}LapZone{% endblock %}</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#0f172a;
color:white;
}

/* NAVBAR */

.navbar{
background:black !important;
}

.navbar-brand{
color:#00ffff !important;
font-weight:700;
}

.nav-link{
color:white !important;
}

.nav-link:hover{
color:#00ffff !important;
}


/* FOOTER */

.footer{
background:black;
color:#94a3b8;
padding:15px;
text-align:center;
margin-top:50px;
}

</style>

</head>

<body>


<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg">

<div class="container">

<a class="navbar-brand" href="/">LapZone</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="/">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/acer">Acer</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/asus">Asus</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/hp">HP</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/dell">Dell</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/lenovo">Lenovo</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/sony">Sony</a>
</li>

</ul>

</div>

</div>

</nav>



<!-- MAIN CONTENT -->

<div class="container mt-4">

{% block content %}

{% endblock %}

</div>



<!-- FOOTER -->

<div class="footer">

© 2026 LapZone | All Rights Reserved

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
